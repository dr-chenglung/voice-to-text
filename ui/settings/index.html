<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>設定 Settings</title>
<link rel="stylesheet" href="settings.css" />
</head>
<body>
<form id="form">
  <h1>語音免打字 — 設定</h1>

  <fieldset>
    <legend>語音轉文字 (STT)</legend>
    <label>
      STT API Key
      <input type="password" id="stt_api_key" placeholder="留空＝不變更目前已設定的金鑰" autocomplete="off" />
    </label>
    <p class="hint" id="stt_api_key_hint"></p>

    <label>
      STT API URL
      <input type="text" id="stt_api_url" placeholder="https://api.groq.com/openai/v1/audio/transcriptions" />
    </label>

    <label>
      STT 模型
      <input type="text" id="stt_model" />
    </label>
  </fieldset>

  <fieldset>
    <legend>文字校正 (LLM)</legend>
    <label>
      LLM API Key
      <input type="password" id="llm_api_key" placeholder="留空＝不變更目前已設定的金鑰" autocomplete="off" />
    </label>
    <p class="hint" id="llm_api_key_hint"></p>

    <label>
      LLM API URL
      <input type="text" id="llm_api_url" placeholder="https://api.groq.com/openai/v1/chat/completions" />
    </label>

    <label>
      校正用 LLM 模型
      <input type="text" id="llm_model" />
    </label>

    <label>
      個人詞彙表
      <textarea id="vocabulary" rows="3" placeholder="常用專有名詞，逗號或換行分隔，例：Tauri, Rust, cpal, 系統列"></textarea>
    </label>
    <p class="hint">同時用於語音辨識引導（Whisper prompt）與校正時修正音譯/誤辨的專有名詞。</p>

    <label class="checkbox">
      <input type="checkbox" id="enable_formatting" />
      智慧排版（長內容自動分段/條列，允許輕度濃縮）
    </label>
    <p class="hint">需同時啟用下方「LLM 輕度校正」才會生效；短內容仍維持單一段落不排版。</p>
  </fieldset>

  <label class="checkbox">
    <input type="checkbox" id="enable_correction" />
    啟用 LLM 輕度校正
  </label>

  <label>
    熱鍵
    <select id="hotkey">
      <option value="right_alt">右 Alt（預設）</option>
      <option value="right_ctrl">右 Ctrl</option>
    </select>
  </label>
  <p class="hint">變更熱鍵後需要重新啟動程式才會生效。</p>

  <div class="actions">
    <button type="submit" id="save">儲存</button>
    <span id="status"></span>
  </div>
</form>
<script src="settings.js"></script>
</body>
</html>
