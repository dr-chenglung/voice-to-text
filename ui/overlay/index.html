<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>voice-overlay</title>
<link rel="stylesheet" href="overlay.css" />
</head>
<body>
<!-- 標準填滿式麥克風圖示（Bootstrap Icons mic-fill 造型：圓角機身 + U 形支架 + 直柱 + 底座）。
     底下 #stage::before 是半透明圓形底盤，確保在任何背景（深色 IDE / 白色文件）都看得見；
     圖示顏色、發光、輕微縮放由 overlay.js 隨音量即時套用。 -->
<div id="stage">
  <svg id="mic" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0z" />
    <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5" />
  </svg>
</div>
<script src="overlay.js"></script>
</body>
</html>
